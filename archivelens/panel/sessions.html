<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArchiveLens — Research Sessions</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #14171e; --bg2: #1c2029; --bg3: #252a36;
      --accent: #4f9cf9; --accent2: #6fcf97;
      --warn: #f2994a; --danger: #eb5757;
      --text: #e4e8f0; --text2: #8b95a8;
      --border: #2e3444; --radius: 6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    #header h1 { font-size: 15px; font-weight: 700; color: var(--accent); flex: 1; }

    .btn {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      cursor: pointer; font-size: 12px; font-weight: 500;
      padding: 5px 10px; transition: background 0.15s;
    }
    .btn:hover { background: var(--border); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { background: #3b87e8; }
    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn-danger:hover { background: #c94040; }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }

    #search-sessions {
      flex: 1;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 13px; padding: 6px 10px; outline: none;
    }
    #search-sessions:focus { border-color: var(--accent); }

    #sessions-container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 12px;
    }

    .session-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .session-card:hover { border-color: var(--accent); }

    .session-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .session-title input {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-size: 14px;
      font-weight: 600; padding: 2px 6px; width: 100%; outline: none;
    }
    .session-title input:focus { border-color: var(--accent); }

    .session-meta {
      font-size: 11px;
      color: var(--text2);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .session-status {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .status-active   { background: rgba(79,156,249,0.2); color: var(--accent); }
    .status-complete { background: rgba(111,207,151,0.2); color: var(--accent2); }
    .status-archived { background: rgba(139,149,168,0.2); color: var(--text2); }

    .session-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .linked-sessions-badge {
      background: rgba(79,156,249,0.15);
      border: 1px solid rgba(79,156,249,0.3);
      border-radius: var(--radius);
      padding: 4px 8px;
      font-size: 11px;
      color: var(--accent);
      margin-top: 6px;
      cursor: pointer;
    }

    #no-sessions {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--text2);
      padding: 40px;
    }

    /* Obsidian export modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      width: 400px;
      max-width: 95vw;
    }

    .modal h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .modal p {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="header">
    <h1>🔍 ArchiveLens — Research Sessions</h1>
    <button class="btn" id="btn-back" onclick="window.close()">✕ Close</button>
  </div>

  <div id="toolbar">
    <input type="text" id="search-sessions" placeholder="Search by title or entity name…" />
    <select id="sort-select" style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:5px 8px;font-size:12px;outline:none">
      <option value="lastModified-desc">Most recent</option>
      <option value="lastModified-asc">Oldest</option>
      <option value="title-asc">Title A→Z</option>
      <option value="title-desc">Title Z→A</option>
    </select>
  </div>

  <div id="sessions-container">
    <div id="no-sessions" class="hidden">No sessions found.</div>
  </div>

  <!-- Obsidian export modal -->
  <div id="obsidian-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2>Export to Obsidian Vault</h2>
      <p>
        This will generate a ZIP of Markdown files — one per entity, one per source document —
        with <code>[[wikilink]]</code>-style cross-references, suitable for direct import into
        an Obsidian vault.
      </p>
      <p id="obsidian-session-label" style="color:var(--text); font-weight:600"></p>
      <div class="modal-actions">
        <button class="btn" id="btn-obsidian-cancel">Cancel</button>
        <button class="btn btn-primary" id="btn-obsidian-confirm">Export</button>
      </div>
    </div>
  </div>

  <script src="sessions.js" type="module"></script>
</body>
</html>
